<!DOCTYPE html>
<html>
<head>
<title>LOGIN PAGE</title>
<style>
	/*FONT FAMILY*/
	@import url('https://fonts.googleapis.com/css2?family=Griffy');

	.griffy-family{
		font-family: "Griffy", system-ui;
	}

	body {
	background-image: url('bg.gif');
	background-position: center;
	background-repeat: no-repeat;
	background-size: cover;
	}
	
	.header {
    width:100%;
    height:230px;
    background-color:black;
    float:left;
	}

	.header2 {
    width:100%;
    height:100vh;   
    display:flex;
    justify-content:center;  
    align-items:center;      
	}

/* LOGIN CARD */
	.login-box{
    background: black;
    width:500px;
    padding:40px;
    border-radius:25px;
    text-align:center;
	}

	.login-box img{
		width:200px;
		margin-bottom:15px;
	}

	.login-box h1{
		margin:0;
		font-size:28px;
		font-weight:bold;
	}

	.login-box h1{
		margin:0;
		font-size:50px;
		letter-spacing:10px;
		color:white;
		text-shadow: 1px 1px 4px #800000;
		font-family: "Griffy", cursive;
		font-weight: bold;
	}

	.subtitle{
		color:#800000;
		margin-bottom:30px;
		font-size:50px;
		font-family: "Griffy", cursive;
		font-weight: 700;
	}


	.input-group{
    margin-bottom:22px;
    text-align:left;
	}

	.input-group label{
		font-size:14px;
		color:#aaa;
	}

	.input-group input{
		width:100%;
		padding:14px;
		margin-top:6px;
		border-radius:12px;
		border:none;
		background:#1a1a1a;
		color:white;
		font-size:14px;
	}

	.input-group input::placeholder{
		color:#aaa;
	}

	.input-group input:focus{
		outline:none;
		box-shadow:0 0 10px #800000;
	}


	button{
    width:100%;
    padding:15px;
    background:white;
    border:none;
    border-radius:14px;
    color:black;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
	}

	button:hover{
    background:#800000;
    box-shadow:0 0 20px #800000;
	}

	.links{
		margin-top:25px;
		font-size:14px;
	}

	.links hr{
		margin:25px 0;
		border:0.5px solid #333;
	}


</style>
</head>

<body>
	<div class="header">
	<img src="banner.png" width="100%"; height="230px">
	</div>
	
	<div class="header2">
		<div class="login-box">

    <img src="guy.png">

    <p class="subtitle">Log In</p>

    <form onsubmit="return loginUser()">

    <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email">
    </div>

    <div class="input-group">
        <input type="password" id="password" placeholder="Password">
    </div>

	<button type="submit" class="login-btn">Sign In</button>
	
	</form>

    <div class="links">
        <p><a href="#"><button>Forgot Password?</button></a></p>
        <hr>

    </div>

</div>
	</div>
	
	<script>
	function loginUser() {
    var email = document.getElementById("email").value.trim();
    var password = document.getElementById("password").value.trim();

    // login rule
    if (email.includes("@") && password !== "") {
        window.location.href = "home.html"; 
    } else {
        alert("Please enter a valid email and password.");
    }

    return false; 
	}
	</script>

 </body>
 </html>
