<!DOCTYPE html>
<html>
<head>
<title>VIP Access</title>

<style>

	body{
	  background:black url("background.gif") center/cover no-repeat;
	  font-family: Arial, sans-serif;
	  color:white;
	}

.sideheaderleft {
	width:10%;
    height:230px;
    background-color:black;
    float:left;
	background-size:cover;
	background-image: url('movingeye.gif');
	background-position:center;
	background-repeat:no-repeat;
	}
	
	.sidebar{
	  width:180px;
	  height:100vh;
	  background: rgba(0,0,0,0.85);
	  position:fixed;
	  left:0;
	  top:0;
	  text-align:center;
	  padding-top:20px;
	  border-right:2px solid #800000;
	}
	
	.sidebar img{
	  width:70px;
	}

	.sidebar img:hover{
	  transform:scale(1.1);
	}

	.sidebar h1{
	  font-size:14px;
	  margin:5px 0 20px;
	  color:white;
	}
	
	.vip-container{
	  width: 500px;
	  margin: 50px auto;
	  
	  background: rgba(0,0,0,0.65);
	  padding: 30px;
	  border-radius: 15px;
	}
	.vip-logo{
	  width:70px;
	  height:70px;
	  object-fit:cover;
	  margin-bottom:10px;
	}
	
	.vip-header img{
	  display:block;
	  margin:0 auto 10px;
	}
	.vip-header{
	  text-align:center;
	  margin-bottom:20px;
	}

	.vip-header h1{
	  margin:10px 0 5px;
	}

	.vip-header p{
	  color:#ccc;
	  font-size:14px;
	}

	.vip-container label{
	  display:block;
	  margin-top:15px;
	  margin-bottom:5px;
	  font-size:14px;
	}

	.vip-container input,
	.vip-container textarea{
	  width:100%;
	  padding:12px;
	  border-radius:10px;
	  border:1px solid #800000;
	  background:#111;
	  color:white;
	  outline:none;
	}

	.vip-container input::placeholder,
	.vip-container textarea::placeholder{
	  color:#bbb;
	}

	.name-row{
	  display:flex;
	  gap:10px;
	}

	.name-row input{
	  width:100%;
	}

	.vip-container textarea{
	  height:100px;
	  resize:none;
	}


	.vip-container button{
	  width:100%;
	  margin-top:20px;
	  padding:14px;
	  border:none;
	  border-radius:10px;
	  background:#800000;
	  color:white;
	  font-weight:bold;
	  cursor:pointer;
	  transition:0.3s;
	}

	.vip-container button:hover{
	  background:#a00000;
	  transform:scale(1.02);
	}
</style>
</head>
<body>
<div class="sideheaderleft">
	</div>
<div class="sidebar">
  <a href="home.html"><img src="house.png"></a>
  <h1>HOME</h1>
  <a href="artist.html"><img src="artist.png"></a>
  <h1>ARTISTS</h1>

  <a href="vip.html"><img src="vip.png"></a>
  <h1>JOIN VIP</h1>
</div>
<div class="vip-container">

  <div class="vip-header">
	<img src="guy.png" class="vip-logo">
    <h1>VIP Customer Contact Form</h1>
    <p>Unlock exclusive VibeStream Pro VIP perks and premium features.</p>
  </div>

  <form>

    <label>Name</label>
    <div class="name-row">
      <input type="text" placeholder="First">
      <input type="text" placeholder="Last">
    </div>

    <label>Birthday</label>
    <input type="date">

    <label>Phone Number</label>
    <input type="tel" placeholder="09XXXXXXXXX">

    <label>Email Address</label>
    <input type="email" placeholder="you@email.com">

    <label>Message</label>
    <textarea placeholder="Tell us why you want VIP access..."></textarea>

    <button type="submit">SUBMIT FORM</button>

  </form>

</div>

</body>
</html>
