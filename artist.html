<!DOCTYPE html>
<html>
<head>
<title>Artists</title>
<link href="https://fonts.googleapis.com/css2?family=Griffy&display=swap" rel="stylesheet">

<style>

body{
  background:black url("lightning.gif") center/cover no-repeat;
  margin:0;
  font-family: Arial, sans-serif;
  color:white;
}

.sideheaderleft {
	width:10%;
    height:230px;
    background-color:black;
    float:left;
	background-size:cover;
	background-image: url('movingeye.gif');
	background-position:center;
	background-repeat:no-repeat;
	}
	
.sidebar{
  width:180px;
  height:100vh;
  background: rgba(0,0,0,0.85);
  position:fixed;
  text-align:center;
  padding-top:20px;
  float:left;
  border-right:2px solid #800000;
}

.sidebar img{
  width:70px;
}

.sidebar h1{
  font-size:14px;
  margin:5px 0 20px;
}

/* MAIN */
.main{
  margin-left:180px;
  padding:40px;
  text-align:center;
}

.main h1{
  font-family: "Griffy", system-ui;
}

/* GRID */
.artist-grid{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:25px;
  margin-top:30px;
}

/* CARD */
.artist{
  background:#800000;
  padding:15px;
  border-radius:15px;
  width:160px;
  cursor:pointer;
  transition:0.3s;
}

.artist:hover{
  transform:scale(1.08);
  box-shadow:0 0 15px #800000;
}

.artist img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
}

.artist-name{
  margin-top:10px;
  font-weight:bold;
}

.artist-genre{
  font-size:12px;
  color:#ddd;
}

.artist-details{
  display:none;
  margin-top:40px;
  background: rgba(0,0,0,0.7);
  padding:25px;
  border-radius:15px;
  max-width:500px;
  margin-left:auto;
  margin-right:auto;
  box-shadow:0 0 15px #800000;
}

.artist-details img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
}

.artist-details h2{
  margin-top:10px;
}

.artist-details ul{
  list-style:none;
  padding:0;
}

.artist-details li{
  padding:5px;
  color:#ddd;
}

</style>
</head>
<body>

<div class="sideheaderleft">
	</div>
	
<div class="sidebar">
  <a href="home.html"><img src="house.png"></a>
  <h1>HOME</h1>

  <a href="artist.html"><img src="artist.png"></a>
  <h1>ARTISTS</h1>

  <a href="vip.html"><img src="vip.png"></a>
  <h1>JOIN VIP</h1>
</div>

<!-- MAIN -->
<div class="main">

  <h1>Discover Artists</h1>

  <div class="artist-grid">

    <div class="artist"
    onclick="showArtist(
    'Evanescence',
    'Rock',
    'A Grammy-winning rock band known for emotional and powerful music.',
    ['Bring Me To Life','My Immortal','Call Me When You’re Sober'],
    'evanescence.jpg'
    )">
      <img src="evanescence.jpg">
      <div class="artist-name">Evanescence</div>
      <div class="artist-genre">Gothic Metal/Alternative Metal/Hard Rock</div>
    </div>

    <div class="artist"
    onclick="showArtist(
    'Mitski',
    'Indie',
    'Indie artist known for emotional storytelling and unique sound.',
    ['Nobody','Washing Machine Heart','Abbey'],
    'mitski.png'
    )">
      <img src="mitski.png">
      <div class="artist-name">Mitski</div>
      <div class="artist-genre">Indie/Alternative</div>
    </div>

    <div class="artist"
    onclick="showArtist(
    'Chappell Roan',
    'Pop',
    'Pop artist known for bold visuals and theatrical music style.',
    ['Pink Pony Club','Casual','Red Wine Supernova'],
    'chappell.jpg'
    )">
      <img src="chappell.jpg">
      <div class="artist-name">Chappell Roan</div>
      <div class="artist-genre">Synth-pop/Indie-pop/Dance-pop</div>
    </div>

    <div class="artist"
    onclick="showArtist(
    'Tubero',
    'Alt Rock',
    'Filipino alternative band known for humor and bold lyrics.',
    ['Guard Tang Ina Mo','Hindi Ako Nagbi-Brip','Kabet'],
    'tubero.jpg'
    )">
      <img src="tubero.jpg">
      <div class="artist-name">Tubero</div>
      <div class="artist-genre">Grindcore, with elements of death metal and hardcore punk</div>
    </div>

    <div class="artist"
    onclick="showArtist(
    'Carlos Agassi',
    'OPM',
    'Actor and performer known for viral OPM hits.',
    ['Problema','Milk Tea','Para Sa Streets'],
    'carlos.jpg'
    )">
      <img src="carlos.jpg">
      <div class="artist-name">Carlos Agassi</div>
      <div class="artist-genre">Hip-Hop/Rap</div>
    </div>

    <div class="artist"
    onclick="showArtist(
    'Princess Rica',
    'Viral Pop',
    'Internet viral personality turned pop performer.',
    ['Sulutera','Boyfriend Kong Baduy','TikTok Love'],
    'princessrica.jpg'
    )">
      <img src="princessrica.jpg">
      <div class="artist-name">Princess Rica</div>
      <div class="artist-genre">Viral Pop</div>
    </div>

  </div>

  <div id="artistDetails" class="artist-details">
    <img id="detailImg">
    <h2 id="detailName"></h2>
    <p id="detailGenre"></p>
    <p id="detailBio"></p>

    <h3>Popular Songs</h3>
    <ul id="detailSongs"></ul>
  </div>

</div>

<script>
function showArtist(name, genre, bio, songs, img){

  document.getElementById("artistDetails").style.display = "block";

  document.getElementById("detailName").innerText = name;
  document.getElementById("detailGenre").innerText = genre;
  document.getElementById("detailBio").innerText = bio;
  document.getElementById("detailImg").src = img;

  let list = document.getElementById("detailSongs");
  list.innerHTML = "";

  songs.forEach(song => {
    let li = document.createElement("li");
    li.textContent = song;
    list.appendChild(li);
  });

  window.scrollTo({
    top: document.body.scrollHeight,
    behavior: "smooth"
  });
}
</script>

</body>
</html>
